# Local dev stack (PRD §11.1): FastAPI API + Redis + PostgreSQL.
# The CPU-heavy slicer runs as its own image (docker/slicer.Dockerfile); in
# production it becomes a separate worker droplet pulling jobs off Redis.
services:
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      SLICER2_DATA_DIR: /data
      DATABASE_URL: postgresql+psycopg://slicer:slicer@db:5432/slicer2
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./backend/profiles:/app/profiles
      - slicer_data:/data
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slicer
      POSTGRES_PASSWORD: slicer
      POSTGRES_DB: slicer2
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # CPU-heavy slicing runs here, draining the Redis "slicing" queue. Built from
  # the OrcaSlicer image so it carries the binary + baked A1 profiles.
  worker:
    build:
      context: .
      dockerfile: docker/slicer.Dockerfile
    command: ["rq", "worker", "slicing", "--url", "redis://redis:6379/0"]
    environment:
      DATABASE_URL: postgresql+psycopg://slicer:slicer@db:5432/slicer2
      REDIS_URL: redis://redis:6379/0
      SLICER2_DATA_DIR: /data
    depends_on:
      - db
      - redis

volumes:
  pg_data:
  slicer_data:
