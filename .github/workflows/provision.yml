name: Provision infrastructure

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Bootstrap state bucket
        working-directory: infra
        run: |
          pip install boto3 -q
          python bootstrap_state.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

      - name: Terraform init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_ID }}
          TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}

      - name: Terraform apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_ID }}
          TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
          TF_VAR_ssh_key_ids: '["57206872"]'
          TF_VAR_domain: "slicedbambu.com"
