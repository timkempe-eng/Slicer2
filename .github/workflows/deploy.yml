name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get droplet IP from DigitalOcean
        id: ip
        run: |
          IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets?tag_name=slicer2" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print([n['ip_address'] for n in d['droplets'][0]['networks']['v4'] if n.get('type')=='public'][0])")
          echo "address=$IP" >> $GITHUB_OUTPUT
          echo "Droplet public IP: $IP"

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.ip.outputs.address }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/slicer2/app
            git fetch --depth 1 origin main
            git checkout FETCH_HEAD
            # Bring the website up first so it's live regardless of the slicer
            # image build (which pulls a large OrcaSlicer AppImage).
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build app redis caddy
            # The Caddyfile is bind-mounted, so config-only changes don't recreate
            # the container — reload it explicitly (fall back to a recreate).
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \
              || docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --force-recreate caddy
            # Slicer worker: best-effort so a build failure doesn't take the site
            # down. Slicing comes online once this succeeds.
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build worker || echo "WARN: worker build/start failed; site is up, slicing deferred"
