# Production stack run on the DO droplet (see infra/terraform).
# Postgres and Redis run as containers here; Spaces is an external service with
# credentials injected via deploy/.env (SPACES_*). DATABASE_URL is set directly
# in the environment sections below (no managed DB needed).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: slicer2
      POSTGRES_USER: slicer2
      POSTGRES_PASSWORD: slicer2local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slicer2"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://slicer2:slicer2local@postgres:5432/slicer2
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"
    # Hardening: no privilege escalation, drop all Linux capabilities, cap
    # processes/memory so a bug or abusive request can't take over the host.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 768m

  # CPU-heavy slicing runs here, off the web process, draining the Redis queue.
  # This is the highest-risk surface (it runs OrcaSlicer on untrusted uploads),
  # so the same hardening applies, with more room for the slicer's processes.
  worker:
    build:
      context: ..
      dockerfile: docker/slicer.Dockerfile
    command: ["rq", "worker", "slicing", "--url", "redis://redis:6379/0"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://slicer2:slicer2local@postgres:5432/slicer2
      REDIS_URL: redis://redis:6379/0
      SLICER2_DATA_DIR: /data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 1024
    mem_limit: 3g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # NOTE: no `cap_drop: ALL` here — the redis entrypoint drops root->redis via
    # su-exec, which needs CAP_SETUID/SETGID. no-new-privileges still applies.
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
