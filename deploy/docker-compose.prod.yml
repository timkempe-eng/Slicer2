# Production stack run on the DO droplet (see infra/terraform).
# Postgres and Spaces are external managed services, injected via deploy/.env
# (DATABASE_URL, SPACES_*). Redis runs here; the slicer runs as its own worker.
services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    expose:
      - "8000"
    # Hardening: no privilege escalation, drop all Linux capabilities, cap
    # processes/memory so a bug or abusive request can't take over the host.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 768m

  # CPU-heavy slicing runs here, off the web process, draining the Redis queue.
  # This is the highest-risk surface (it runs OrcaSlicer on untrusted uploads),
  # so the same hardening applies, with more room for the slicer's processes.
  worker:
    build:
      context: ..
      dockerfile: docker/slicer.Dockerfile
    command: ["rq", "worker", "slicing", "--url", "redis://redis:6379/0"]
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      SLICER2_DATA_DIR: /data
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 1024
    mem_limit: 3g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  redis_data:
  caddy_data:
  caddy_config:
